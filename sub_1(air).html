<script>
  const saleOpen = document.querySelector('.sale-help-open');
  const saleIcon = document.querySelector('.sale-help-icon');
  const salePopup = document.querySelector('#salePopup');
  const saleClose = document.querySelector('.sale-popup-close');

  function openSalePopup(e) {
    e.preventDefault();
    salePopup.classList.add('on');
  }

  saleOpen.addEventListener('click', openSalePopup);
  saleIcon.addEventListener('click', openSalePopup);

  saleClose.addEventListener('click', function () {
    salePopup.classList.remove('on');
  });

  salePopup.addEventListener('click', function (e) {
    if (e.target === salePopup) {
      salePopup.classList.remove('on');
    }
  });
</script>
